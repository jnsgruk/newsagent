repos:
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        language: system
        entry: mise run fmt
        pass_filenames: false
        types: [rust]

      - id: lint
        name: cargo clippy
        language: system
        entry: mise run lint
        pass_filenames: false
        types: [rust]

      - id: test
        name: cargo test
        language: system
        entry: mise run test
        pass_filenames: false
        types: [rust]
